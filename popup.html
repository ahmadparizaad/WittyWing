<!DOCTYPE html>
<html>
<head>
  <title>WittyWing</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 300px;
      padding: 15px;
      background-color: #f7f7f7;
    }
    h2 {
      color: #333;
      text-align: center;
      margin-bottom: 20px;
      font: serif;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #555;
    }
    input[type="text"] {
      width: calc(100% - 20px);
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      background-color: #1da1f2;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
      margin-bottom: 10px;
    }
    button:hover {
      background-color: #0d8ddb;
    }
    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
    #test-api-key {
      background-color: #28a745;
    }
    #test-api-key:hover {
      background-color: #218838;
    }
    #status-message {
      margin-top: 15px;
      text-align: center;
      color: green;
    }
  </style>
</head>
<body>
  <h2>WittyWing</h2>
  <label for="api-key">Google Gemini API Key:</label>
  <input type="text" id="api-key" placeholder="Enter your Google Gemini API key">
  <button id="test-api-key">Test API Key</button>
  <button id="start-automation">Start Automation</button>
  <div id="status-message"></div>
  <script src="popup.js"></script>
</body>
</html>
